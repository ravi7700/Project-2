apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-trend-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-trend-app
  template:
    metadata:
      labels:
        app: react-trend-app
    spec:
      containers:
      - name: react-trend-app
        image: ravikumarr10839/react-trend-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: react-trend-app-service
spec:
  type: LoadBalancer
  selector:
    app: react-trend-app
  ports:
    - port: 3000
      targetPort: 80
